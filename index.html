<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>VibeGen Ultra</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
    <style>
        body{background:radial-gradient(circle at top,#111827,#020617); min-height: 100vh; display: flex; align-items: center; justify-content: center; overflow-x:hidden}
        .glass{background:rgba(255,255,255,.06);backdrop-filter:blur(20px);border:1px solid rgba(255,255,255,.08)}
        .glow{box-shadow:0 0 35px rgba(34,211,238,.35)}
        .float{animation:float 4s ease-in-out infinite}
        @keyframes float{0%,100%{transform:translateY(0)}50%{transform:translateY(-14px)}}
        iframe { border-radius: 1.5rem; border: 1px solid rgba(34,211,238,0.2); }
    </style>
</head>
<body class="text-white">
    <div class="glass glow rounded-[2.5rem] w-[92%] max-w-md p-10 text-center float">
        <div class="w-24 h-24 mx-auto rounded-full bg-cyan-500/20 flex items-center justify-center mb-6 glow">
            <i class="fa-solid fa-wave-square text-4xl text-cyan-300"></i>
        </div>
        <h1 class="text-4xl font-black tracking-tighter text-cyan-300">VIBEGEN AI</h1>
        <p class="text-slate-400 mt-3 text-sm italic" id="lyrics-display">"Feel your mood. Generate your sound."</p>
        
        <input id="vibe-input" placeholder="Sad rain / Romantic night..." 
               class="w-full mt-8 p-5 rounded-2xl bg-white/5 border border-cyan-500/20 outline-none focus:border-cyan-400 transition-all text-center" />
        
        <button id="send-btn" class="w-full mt-6 bg-cyan-500 hover:bg-cyan-400 text-black font-black py-5 rounded-2xl glow transition-all active:scale-95 uppercase tracking-widest">
            Generate Vibe
        </button>
        
        <div class="mt-8 glass rounded-3xl p-2 hidden" id="player-card">
            <div id="music-container">
                <!-- YouTube Iframe injected here -->
            </div>
            <p class="py-3 text-[10px] text-cyan-500/50 uppercase tracking-widest font-bold">AI Synced Player Active</p>
        </div>

        <div id="status-text" class="mt-4 text-[10px] text-slate-500 uppercase tracking-[0.2em]">Ready to Sync</div>
    </div>

    <script>
        // 🚨 GAS URL ekdum sahi wala daalna
        const GAS_URL = "https://script.google.com/macros/s/AKfycbyk8RtojcOPgwRhYHsjEPNVZHKX-_pKqrRzwI3fFHnSF-2AyCKUpMcZrmi4mQ2EwZ2deg/exec";

        async function sendVibe() {
            const input = document.getElementById("vibe-input");
            const btn = document.getElementById("send-btn");
            const status = document.getElementById("status-text");
            const playerCard = document.getElementById("player-card");
            const musicBox = document.getElementById("music-container");
            const lyricsDisplay = document.getElementById("lyrics-display");

            if (!input.value.trim()) {
                alert("Bhai vibe toh likho!");
                return;
            }

            // UI Loading State
            btn.innerText = "Syncing Vibe...";
            btn.disabled = true;
            status.innerText = "AI is analyzing your mood...";
            playerCard.classList.add("hidden");

            try {
                // Real Fetch Request to Google Script
                const response = await fetch(GAS_URL, {
                    method: "POST",
                    body: JSON.stringify({ mood: input.value })
                });

                const data = await response.json();

                if (data.youtube_url) {
                    // AI se aaye lyrics dikhao
                    lyricsDisplay.innerText = `"${data.lyrics}"`;

                    // YouTube Player Inject karo
                    musicBox.innerHTML = `
                        <iframe width="100%" height="180" 
                            src="${data.youtube_url}" 
                            frameborder="0" 
                            allow="autoplay; encrypted-media; picture-in-picture" 
                            allowfullscreen>
                        </iframe>`;

                    playerCard.classList.remove("hidden");
                    status.innerText = "Vibe Matched 🎵";
                } else if (data.error) {
                    throw new Error(data.error);
                }

            } catch (error) {
                console.error(error);
                status.innerText = "Connection Failed!";
                alert("Error: " + error.message);
            } finally {
                btn.innerText = "Generate Vibe";
                btn.disabled = false;
            }
        }

        document.getElementById("send-btn").addEventListener("click", sendVibe);
    </script>
</body>
</html>
