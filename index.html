<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>VibeGen AI Pro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        body {
            background: #121212;
            color: white;
            font-family: 'Circular', sans-serif;
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }
        .main-content { flex: 1; overflow-y: auto; padding-bottom: 90px; }
        .spotify-card {
            background: linear-gradient(180deg, rgba(255,255,255,0.08) 0%, rgba(255,255,255,0.02) 100%);
            border: 1px solid rgba(255,255,255,0.1);
            backdrop-filter: blur(12px);
        }
        .bar { width: 4px; height: 15px; background: #1DB954; border-radius: 2px; animation: bounce 1s infinite alternate; }
        @keyframes bounce { from { height: 4px; } to { height: 24px; } }
        
        nav {
            position: fixed;
            bottom: 0; left: 0; right: 0;
            background: rgba(18, 18, 18, 0.98);
            backdrop-filter: blur(20px);
            border-top: 1px solid rgba(255,255,255,0.05);
            padding-bottom: env(safe-area-inset-bottom);
            z-index: 100;
        }
        .no-scrollbar::-webkit-scrollbar { display: none; }
    </style>
</head>
<body>

    <!-- Header -->
    <header class="p-5 flex justify-between items-center shrink-0">
        <div class="flex items-center gap-2">
            <i class="fa-brands fa-spotify text-3xl text-[#1DB954]"></i>
            <h1 class="text-xl font-bold tracking-tight">VibeGen <span class="font-light opacity-50">AI</span></h1>
        </div>
        <div class="bg-white/5 px-3 py-1.5 rounded-full border border-white/10 flex items-center gap-2">
            <i class="fa-solid fa-coins text-yellow-500 text-[10px]"></i>
            <span id="coin-count" class="text-xs font-bold">--</span>
        </div>
    </header>

    <!-- Main Content -->
    <main class="main-content px-6 no-scrollbar">
        <div class="flex flex-col gap-5 max-w-md mx-auto">
            
            <!-- AI Visualizer -->
            <div class="spotify-card w-full p-8 rounded-[2rem] flex flex-col items-center gap-4">
                <div class="flex items-end gap-1.5 h-10">
                    <div class="bar" style="animation-delay: 0.1s"></div>
                    <div class="bar" style="animation-delay: 0.3s"></div>
                    <div class="bar" style="animation-delay: 0.2s"></div>
                    <div class="bar" style="animation-delay: 0.4s"></div>
                </div>
                <div class="text-center">
                    <p id="ai-status" class="text-[9px] uppercase tracking-[0.2em] opacity-40 font-black mb-1">AI Matcher Ready</p>
                    <h2 id="current-mood" class="text-lg font-bold italic">What's your vibe?</h2>
                </div>
            </div>

            <!-- PLAYER SLOT (Hamesha jagah rakhega) -->
            <div id="player-container" class="w-full min-h-[80px] bg-white/5 rounded-2xl flex items-center justify-center overflow-hidden border border-white/5">
                <p id="player-placeholder" class="text-[10px] opacity-20 uppercase tracking-widest font-bold">Player Ready</p>
                <iframe id="spotify-iframe" class="hidden" width="100%" height="80" frameBorder="0" allow="autoplay; clipboard-write; encrypted-media; fullscreen; picture-in-picture"></iframe>
            </div>

            <!-- Input Section -->
            <div class="space-y-4">
                <div class="relative">
                    <input id="vibe-input" type="text" placeholder="Explain your situation..." 
                        class="w-full bg-white/5 py-4 px-6 rounded-2xl outline-none border border-white/10 focus:border-[#1DB954] text-sm">
                    <button id="vibe-btn" class="absolute right-2 top-2 w-10 h-10 bg-[#1DB954] text-black rounded-xl flex items-center justify-center shadow-lg">
                        <i class="fa-solid fa-wand-magic-sparkles"></i>
                    </button>
                </div>

                <!-- Quick Pills -->
                <div class="flex gap-2 overflow-x-auto no-scrollbar py-1">
                    <button onclick="quickVibe('Gym 🔥')" class="whitespace-nowrap px-5 py-2.5 rounded-xl bg-white/5 border border-white/10 text-[11px] font-bold uppercase tracking-wider">🔥 Gym</button>
                    <button onclick="quickVibe('Night 🌙')" class="whitespace-nowrap px-5 py-2.5 rounded-xl bg-white/5 border border-white/10 text-[11px] font-bold uppercase tracking-wider">🌙 Night</button>
                    <button onclick="quickVibe('Chill ☕')" class="whitespace-nowrap px-5 py-2.5 rounded-xl bg-white/5 border border-white/10 text-[11px] font-bold uppercase tracking-wider">☕ Chill</button>
                    <button onclick="quickVibe('Sad 💔')" class="whitespace-nowrap px-5 py-2.5 rounded-xl bg-white/5 border border-white/10 text-[11px] font-bold uppercase tracking-wider">💔 Sad</button>
                </div>
            </div>
        </div>
    </main>

    <!-- Navigation -->
    <nav class="flex justify-around items-center p-4">
        <div class="flex flex-col items-center gap-1 text-[#1DB954]">
            <i class="fa-solid fa-house-chimney text-lg"></i>
            <span class="text-[8px] font-black uppercase tracking-tighter">Home</span>
        </div>
        <div class="flex flex-col items-center gap-1 opacity-20">
            <i class="fa-solid fa-bolt-lightning text-lg"></i>
            <span class="text-[8px] font-black uppercase tracking-tighter">Discover</span>
        </div>
        <div class="flex flex-col items-center gap-1 opacity-20">
            <i class="fa-solid fa-sliders text-lg"></i>
            <span class="text-[8px] font-black uppercase tracking-tighter">Settings</span>
        </div>
    </nav>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getFirestore, doc, onSnapshot, getDoc, updateDoc, setDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

    const firebaseConfig = {
        apiKey: "AIzaSyBlg80EyJqxsgCg2IWhKc8I57M4KgKijI",
        authDomain: "vibegen-78d89.firebaseapp.com",
        projectId: "vibegen-78d89",
        storageBucket: "vibegen-78d89.firebasestorage.app",
        messagingSenderId: "558487531782",
        appId: "1:558487531782:web:98c1800201b2182bb32e87"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);
    const GAS_URL = "https://script.google.com/macros/s/AKfycbyk8RtojcOPgwRhYHsjEPNVZHKX-_pKqrRzwI3fFHnSF-2AyCKUpMcZrmi4mQ2EwZ2deg/exec";

    let userUID = localStorage.getItem('vibe_uid') || "user_" + Math.random().toString(36).substr(2, 9);
    localStorage.setItem('vibe_uid', userUID);

    onSnapshot(doc(db, "users", userUID), (s) => {
        if(s.exists()) document.getElementById('coin-count').innerText = s.data().coins;
        else setDoc(doc(db, "users", userUID), { coins: 50 });
    });

    window.quickVibe = (t) => { document.getElementById('vibe-input').value = t; process(); };

    async function process() {
        const input = document.getElementById('vibe-input');
        const mood = input.value.trim();
        if(!mood) return;

        const userRef = doc(db, "users", userUID);
        const snap = await getDoc(userRef);
        let coins = snap.data().coins;
        if(coins <= 0) return alert("No coins!");

        // 1. Player Update
        const iframe = document.getElementById('spotify-iframe');
        const placeholder = document.getElementById('player-placeholder');
        
        placeholder.innerText = "TUNING DNA...";
        iframe.classList.remove('hidden');
        placeholder.classList.add('hidden');
        
        // Embed logic: direct playlist search
        iframe.src = `https://open.spotify.com/embed/search/${encodeURIComponent(mood)}`;

        // 2. Database Action
        await updateDoc(userRef, { coins: coins - 1 });
        fetch(GAS_URL, { method: 'POST', mode: 'no-cors', body: JSON.stringify({ mood, user: userUID }) });

        // 3. Status
        document.getElementById('ai-status').innerText = "Vibe Matching...";

        setTimeout(() => {
            window.location.href = `spotify:search:${encodeURIComponent(mood)}`;
        }, 2000);
    }
    document.getElementById('vibe-btn').onclick = process;
</script>
</body>
</html>
