<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>⚠️ SYSTEM CRITICAL ERROR</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: black; color: #00ff00; font-family: 'Courier New', Courier, monospace; overflow: hidden; }
        .matrix-text { font-size: 1.2rem; line-height: 1.5; }
        @keyframes blink { 0% { opacity: 1; } 50% { opacity: 0; } 100% { opacity: 1; } }
        .cursor { display: inline-block; width: 10px; height: 20px; background: #00ff00; animation: blink 1s infinite; }
    </style>
</head>
<body class="p-10">

    <div id="hacker-screen" class="matrix-text">
        <p id="log"></p>
        <span class="cursor"></span>
    </div>

    <div id="prank-result" class="hidden fixed inset-0 bg-red-600 flex flex-col items-center justify-center text-white text-center p-5">
        <h1 class="text-6xl font-black mb-4">Pappu Banaya! 😂</h1>
        <p class="text-2xl font-bold">Darr gaya na bhai?</p>
        <button onclick="location.reload()" class="mt-8 bg-white text-red-600 px-6 py-3 rounded-full font-bold">Phir se karein?</button>
    </div>

    <script>
        const logs = [
            "> Initializing exploit...",
            "> Connecting to local IP 192.168.1.1...",
            "> Status: CONNECTED",
            "> Accessing Browser History...",
            "> Finding 'Private' Folders...",
            "> UPLOADING DATA TO DARK WEB (45%)...",
            "> UPLOADING DATA TO DARK WEB (89%)...",
            "> ALERT: Trojan virus injected!",
            "> Deleting System32... Please do not turn off your PC.",
            "> 5...",
            "> 4...",
            "> 3...",
            "> 2...",
            "> 1..."
        ];

        let i = 0;
        const logElement = document.getElementById('log');

        function showLogs() {
            if (i < logs.length) {
                logElement.innerHTML += logs[i] + "<br>";
                i++;
                setTimeout(showLogs, 800); // Har line 0.8 sec mein aayegi
            } else {
                setTimeout(() => {
                    document.getElementById('hacker-screen').classList.add('hidden');
                    document.getElementById('prank-result').classList.remove('hidden');
                    // Phone vibrate karne ka jugaad (agar allowed ho)
                    if (navigator.vibrate) navigator.vibrate([500, 200, 500]);
                }, 1000);
            }
        }

        window.onload = showLogs;
    </script>
</body>
</html>
