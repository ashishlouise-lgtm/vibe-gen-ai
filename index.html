<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Kundli Pro - Destiny Unlocked</title>
    <script src="https://www.gstatic.com/firebasejs/9.0.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.0.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.0.0/firebase-firestore-compat.js"></script>
    <style>
        :root { --bg: #0b0b1a; --card: #161b33; --accent: #7d5fff; --gold: #facd60; }
        body { background: var(--bg); color: white; font-family: sans-serif; margin: 0; display: flex; justify-content: center; }
        .app { width: 100%; max-width: 450px; padding: 20px; }
        .card { background: var(--card); padding: 25px; border-radius: 20px; border: 1px solid rgba(255,255,255,0.05); margin-bottom: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        .wallet { background: rgba(255,215,0,0.1); border: 1px solid var(--gold); padding: 8px 15px; border-radius: 50px; color: var(--gold); text-align: center; margin-bottom: 20px; }
        input, button { width: 100%; padding: 12px; margin: 8px 0; border-radius: 10px; border: none; box-sizing: border-box; }
        input { background: #0f1225; color: white; border: 1px solid #2d3436; font-size: 16px; }
        button { background: linear-gradient(135deg, #7d5fff, #4b7bec); color: white; font-weight: bold; cursor: pointer; transition: 0.3s; }
        button:active { transform: scale(0.98); }
        .secondary-btn { background: transparent; border: 1px solid var(--accent); color: var(--accent); margin-top: 5px; }
        #cityList { background: #1e272e; border-radius: 10px; position: absolute; width: 85%; z-index: 10; }
        .city-item { padding: 10px; border-bottom: 1px solid #2d3436; cursor: pointer; }
        #loader { display: none; text-align: center; padding: 20px; color: var(--gold); font-weight: bold; }
        #report { display: none; line-height: 1.8; border-top: 1px solid #2d3436; padding-top: 15px; background: rgba(255,255,255,0.02); padding: 15px; border-radius: 10px; }
        .hidden { display: none; }
        .divider { text-align: center; margin: 15px 0; font-size: 12px; color: #555; position: relative; }
    </style>
</head>
<body>

<div class="app">
    <div id="loginArea" class="card">
        <h2 style="text-align: center; margin-bottom: 5px;">✨ AI Kundli Pro</h2>
        <p style="text-align:center; color:#888; font-size: 14px; margin-bottom: 20px;">Email ya Google se login karein</p>
        
        <input type="email" id="authEmail" placeholder="Email Address">
        <input type="password" id="authPassword" placeholder="Password (Min 6 digits)">
        
        <button onclick="handleEmailAuth('login')">Log In</button>
        <button class="secondary-btn" onclick="handleEmailAuth('signup')">Naya Account Banayein</button>

        <div class="divider">OR</div>
        
        <button onclick="loginWithGoogle()" style="background: #fff; color: #000;">Google se Continue karein</button>
    </div>

    <div id="mainApp" class="hidden">
        <div class="wallet">💰 Coins Balance: <span id="coinCount">0</span></div>

        <div class="card">
            <h3>Janam Vivaran</h3>
            <input type="text" id="name" placeholder="Pura Naam">
            <div style="display:flex; gap:10px;">
                <input type="date" id="dob">
                <input type="time" id="tob">
            </div>
            <div style="position:relative;">
                <input type="text" id="citySearch" placeholder="Janam Sthan (City)" oninput="searchCity(this.value)">
                <div id="cityList"></div>
            </div>
            <input type="hidden" id="lat"> <input type="hidden" id="lon">
            
            <button id="unlockBtn" onclick="generateKundli()">Unlock My Destiny (10 Coins)</button>

            <div id="loader">✨ Grah-Nakshatra ki ganna ho rahi hai...</div>
            <div id="report">
                <b id="reportTitle" style="color: var(--gold); font-size: 18px;"></b>
                <p id="reportTxt" style="font-size: 15px; color: #eee;"></p>
                <button onclick="location.reload()" class="secondary-btn" style="font-size: 12px;">Nayi Kundli Dekhein</button>
            </div>
        </div>
        
        <button onclick="auth.signOut(); location.reload();" style="background: none; color: #555; font-size: 12px;">Log Out</button>
    </div>
</div>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyBYlg8OEyJqxsgCg2IWhKc8I57M4KgKijI",
        authDomain: "vibegen-78d89.firebaseapp.com",
        projectId: "vibegen-78d89",
        storageBucket: "vibegen-78d89.firebasestorage.app",
        messagingSenderId: "558487531782",
        appId: "1:558487531782:web:9f324d9e9485c6e5b32e87"
    };

    firebase.initializeApp(firebaseConfig);
    const auth = firebase.auth();
    const db = firebase.firestore();

    // --- NEW EMAIL AUTH LOGIC ---
    async function handleEmailAuth(type) {
        const email = document.getElementById('authEmail').value;
        const pass = document.getElementById('authPassword').value;

        if(!email || !pass) { alert("Email aur Password bhariye"); return; }
        
        try {
            if(type === 'signup') {
                const res = await auth.createUserWithEmailAndPassword(email, pass);
                handleUser(res.user);
            } else {
                const res = await auth.signInWithEmailAndPassword(email, pass);
                handleUser(res.user);
            }
        } catch (e) {
            alert("Error: " + e.message);
        }
    }

    function loginWithGoogle() {
        const provider = new firebase.auth.GoogleAuthProvider();
        auth.signInWithPopup(provider).then(res => handleUser(res.user)).catch(e => alert(e.message));
    }

    auth.onAuthStateChanged(user => { if(user) handleUser(user); });

    async function handleUser(user) {
        document.getElementById('loginArea').classList.add('hidden');
        document.getElementById('mainApp').classList.remove('hidden');
        
        const userRef = db.collection("users").doc(user.uid);
        const doc = await userRef.get();
        
        if(!doc.exists) {
            await userRef.set({ 
                name: user.displayName || user.email.split('@')[0], 
                coins: 10,
                email: user.email 
            }); 
        }
        
        userRef.onSnapshot(snapshot => {
            if(snapshot.exists) document.getElementById('coinCount').innerText = snapshot.data().coins || 0;
        });
    }

    async function searchCity(q) {
        if(q.length < 3) return;
        const res = await fetch(`https://nominatim.openstreetmap.org/search?format=json&q=${q}&limit=5`);
        const data = await res.json();
        let html = '';
        data.forEach(item => {
            html += `<div class="city-item" onclick="setLoc('${item.display_name}',${item.lat},${item.lon})">${item.display_name}</div>`;
        });
        document.getElementById('cityList').innerHTML = html;
    }

    function setLoc(n, la, lo) {
        document.getElementById('citySearch').value = n;
        document.getElementById('lat').value = la; document.getElementById('lon').value = lo;
        document.getElementById('cityList').innerHTML = '';
    }

    async function generateKundli() {
        const user = auth.currentUser;
        const name = document.getElementById('name').value;
        const lat = document.getElementById('lat').value;
        const lon = document.getElementById('lon').value;
        const dob = document.getElementById('dob').value;
        const tob = document.getElementById('tob').value;

        if(!lat || !name || !dob || !tob) { alert("Pehle Janam Vivaran poora bhariye!"); return; }

        const userRef = db.collection("users").doc(user.uid);
        const userDoc = await userRef.get();
        const currentCoins = userDoc.data().coins;

        if(currentCoins < 10) { alert("Kam se kam 10 coins chahiye!"); return; }

        document.getElementById('loader').style.display = 'block';
        document.getElementById('report').style.display = 'none';

        try {
            const response = await fetch('https://script.google.com/macros/s/AKfycbyk8RtojcOPgwRhYHsjEPNVZHKX-_pKqrRzwI3fFHnSF-2AyCKUpMcZrmi4mQ2EwZ2deg/exec', {
                method: 'POST',
    body: JSON.stringify({ name, lat, lon, datetime: dob+'T'+tob+':00Z' })
    // mode: 'no-cors' KO HATA DO ya delete kar do
});
            

const result = await response.json();
document.getElementById('reportTxt').innerText = result.report; // Asli report yahan set hogi
            
            // Note: no-cors mein response nahi padh sakte, isliye hum isse handle karenge
            // Asli app mein hum ek redirect ya cloud function use karte hain
            // Par abhi ke liye main simulation aur coins deduct kar raha hoon
            
            setTimeout(async () => {
                await userRef.update({ coins: currentCoins - 10 });
                document.getElementById('loader').style.display = 'none';
                document.getElementById('report').style.display = 'block';
                document.getElementById('reportTitle').innerText = "Namaste " + name + " Ji,";
                document.getElementById('reportTxt').innerText = "Aapki report taiyar hai. (Note: Apps Script se direct data aane mein CORS ki wajah se thodi dikkat ho sakti hai, agar report khali dikhe toh Apps Script mein permissions check karein).";
            }, 3000);

        } catch (e) {
            alert("Error connecting to server!");
            document.getElementById('loader').style.display = 'none';
        }
    }
</script>
</body>
</html>
