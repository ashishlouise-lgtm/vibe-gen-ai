<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>VibeGen</title>
<script src="https://cdn.tailwindcss.com"></script>
<style>
body{
background:radial-gradient(circle at top,#111827,#020617);
min-height:100vh;
display:flex;
justify-content:center;
align-items:center;
color:white;
font-family:sans-serif;
}
.glass{
background:rgba(255,255,255,.06);
backdrop-filter:blur(20px);
border:1px solid rgba(255,255,255,.08);
}
</style>
</head>
<body>

<div class="glass rounded-3xl p-8 w-[95%] max-w-md text-center">

<h1 class="text-4xl font-bold text-cyan-300">
VIBEGEN
</h1>

<p class="text-gray-400 mt-2">
Type mood and play vibe
</p>

<input
id="mood"
placeholder="sad / romantic / party"
class="w-full p-4 mt-6 rounded-xl bg-black/20 border border-cyan-500/30 outline-none"
/>

<button
id="play"
class="w-full mt-4 bg-cyan-400 text-black font-bold py-4 rounded-xl">
Generate Vibe
</button>

<div id="player" class="mt-6 hidden">
<iframe
id="frame"
width="100%"
height="220"
frameborder="0"
allowfullscreen>
</iframe>

<p id="text" class="mt-3 text-cyan-300"></p>
</div>

</div>

<script>
const mood=document.getElementById("mood");
const play=document.getElementById("play");
const text=document.getElementById("text");

play.onclick=()=>{

if(!mood.value.trim()){
alert("Mood likho");
return;
}

const query=encodeURIComponent(mood.value+" song");

window.open(
"https://www.youtube.com/results?search_query="+query,
"_blank"
);

text.innerText="Opened: "+mood.value;

};
</script>
</script>

</body>
</html>
