<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VibeGen Pro | AI Music Station</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        body { background: #090909; color: white; font-family: 'Inter', sans-serif; height: 100vh; overflow: hidden; }
        .glass-card { background: rgba(255, 255, 255, 0.03); backdrop-filter: blur(20px); border: 1px solid rgba(255, 255, 255, 0.1); }
        .btn-spotify { background: #1DB954; color: black; font-weight: 800; transition: 0.3s; }
        .btn-spotify:active { transform: scale(0.95); }
        .bar { width: 4px; height: 15px; background: #1DB954; border-radius: 10px; animation: wave 1s infinite alternate; }
        @keyframes wave { from { height: 5px; opacity: 0.3; } to { height: 35px; opacity: 1; } }
    </style>
</head>
<body class="flex flex-col">

    <!-- Header -->
    <header class="p-5 flex justify-between items-center z-50">
        <div class="flex items-center gap-2">
            <i class="fa-brands fa-spotify text-2xl text-[#1DB954]"></i>
            <h1 class="text-lg font-black tracking-tighter uppercase">VIBEGEN <span class="text-[#1DB954]">PRO</span></h1>
        </div>
        <div class="flex items-center gap-3">
            <button onclick="toggleModal('promo-modal')" class="bg-yellow-500 text-black text-[10px] font-extrabold px-3 py-1.5 rounded-full shadow-lg shadow-yellow-500/20">PROMOTE</button>
            <div class="bg-white/10 px-3 py-1.5 rounded-full border border-white/10 flex items-center gap-2">
                <i class="fa-solid fa-coins text-yellow-500 text-xs"></i>
                <span id="coin-count" class="text-xs font-bold tracking-widest">--</span>
                <button onclick="showAdGate()" class="ml-1 text-[#1DB954] font-bold">+</button>
            </div>
        </div>
    </header>

    <!-- Main Visualizer -->
    <main class="flex-1 px-6 flex flex-col justify-center gap-10 max-w-md mx-auto w-full">
        <div class="glass-card aspect-square rounded-[3rem] flex flex-col items-center justify-center relative shadow-2xl border-white/5">
            <div id="visualizer" class="flex items-end gap-2 h-24 mb-10">
                <div class="bar" style="animation-delay: 0.1s"></div>
                <div class="bar" style="animation-delay: 0.3s"></div>
                <div class="bar" style="animation-delay: 0.5s"></div>
                <div class="bar" style="animation-delay: 0.2s"></div>
                <div class="bar" style="animation-delay: 0.4s"></div>
            </div>
            <div class="text-center">
                <p id="status-tag" class="text-[9px] uppercase tracking-[0.4em] opacity-40 mb-2 font-bold">System Ready</p>
                <h2 id="current-mood" class="text-xl font-bold italic tracking-tight uppercase px-6">What's your vibe today?</h2>
            </div>
        </div>

        <!-- Search Bar -->
        <div class="relative">
            <input id="vibe-input" type="text" placeholder="Type mood (e.g. Sad Lofi)" 
                class="w-full bg-white/5 border border-white/10 py-5 px-8 rounded-full outline-none focus:border-[#1DB954] transition-all text-sm pr-16 shadow-inner">
            <button id="vibe-btn" class="absolute right-2 top-2 w-12 h-12 btn-spotify rounded-full flex items-center justify-center shadow-lg shadow-[#1DB954]/20">
                <i class="fa-solid fa-bolt-lightning"></i>
            </button>
        </div>
    </main>

    <!-- Ad Gate Modal -->
    <div id="ad-gate" class="hidden fixed inset-0 z-[100] bg-black/95 backdrop-blur-xl flex items-center justify-center p-6 text-center">
        <div class="glass-card p-10 rounded-[3rem] space-y-6 w-full max-w-xs">
            <p class="text-xs text-yellow-500 font-bold uppercase tracking-widest">Watching Ad</p>
            <div class="w-full aspect-video bg-white/5 rounded-2xl flex items-center justify-center overflow-hidden border border-white/10">
                <img src="https://media.giphy.com/media/v1.Y2lkPTc5MGI3NjExM3Y5dzB4bDJ6ZzZ6ZzZ6ZzZ6ZzZ6ZzZ6ZzZ6ZzZ6ZzZ6ZzZ6JmVwPXYxX2ludGVybmFsX2dpZl9ieV9pZCZjdD1n/3o7TKMGpxP5O99wFJC/giphy.gif" class="w-full">
            </div>
            <h3 class="font-bold text-sm">REWARD: +10 COINS</h3>
            <button id="claim-btn" disabled class="w-full py-4 bg-white/10 rounded-full text-[10px] font-bold opacity-30 italic">WAIT <span id="timer">10</span>s...</button>
        </div>
    </div>

    <!-- Promo Modal -->
    <div id="promo-modal" class="hidden fixed inset-0 z-[100] bg-black/98 flex items-center justify-center p-6">
        <div class="glass-card p-8 rounded-[2.5rem] w-full max-w-sm text-center border-yellow-500/20">
            <h2 class="text-xl font-black text-yellow-500 italic mb-2">PROMOTE YOUR SONG</h2>
            <p class="text-[9px] opacity-50 mb-6 uppercase tracking-widest">Get listed in our featured spot</p>
            <div class="bg-white p-3 rounded-3xl inline-block mb-4 border-4 border-yellow-500">
                <img src="https://api.qrserver.com/v1/create-qr-code/?size=150x150&data=upi://pay?pa=YOURID@okicici&pn=VibeGen&am=99" class="w-32 h-32">
            </div>
            <p class="text-[10px] text-gray-400 mb-6">Scan QR, Pay ₹99 & WhatsApp us.</p>
            <button onclick="window.open('https://wa.me/919876543210')" class="w-full py-4 btn-spotify rounded-full text-xs shadow-xl">SEND DETAILS TO OWNER</button>
            <button onclick="toggleModal('promo-modal')" class="mt-4 text-[10px] opacity-30 font-bold uppercase tracking-widest">Later</button>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, doc, getDoc, setDoc, updateDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyBlg80EyJqxsgCg2IWhKc8I57M4KgKijI",
            authDomain: "vibegen-78d89.firebaseapp.com",
            projectId: "vibegen-78d89",
            storageBucket: "vibegen-78d89.firebasestorage.app",
            messagingSenderId: "558487531782",
            appId: "1:558487531782:web:98c1800201b2182bb32e87"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const GAS_URL = "https://script.google.com/macros/s/AKfycbyk8RtojcOPgwRhYHsjEPNVZHKX-_pKqrRzwI3fFHnSF-2AyCKUpMcZrmi4mQ2EwZ2deg/exec";

        let userUID = localStorage.getItem('vibe_uid') || "user_" + Math.random().toString(36).substr(2, 9);
        localStorage.setItem('vibe_uid', userUID);

        async function syncCoins() {
            const userRef = doc(db, "users", userUID);
            const snap = await getDoc(userRef);
            if(snap.exists()) {
                document.getElementById('coin-count').innerText = snap.data().coins;
            } else {
                await setDoc(userRef, { coins: 50 });
                document.getElementById('coin-count').innerText = 50;
            }
        }

        window.processVibe = async function() {
            const mood = document.getElementById('vibe-input').value.trim();
            if(!mood) return;

            const userRef = doc(db, "users", userUID);
            const snap = await getDoc(userRef);
            let coins = snap.data().coins;

            if(coins <= 0) return alert("Zero Coins! Watch ad to get more.");

            document.getElementById('current-mood').innerText = "Generating Vibe...";
            try {
                await fetch(GAS_URL, { method: 'POST', body: JSON.stringify({ mood }) });
                await updateDoc(userRef, { coins: coins - 1 });
                document.getElementById('coin-count').innerText = coins - 1;
                
                window.location.href = `spotify:search:${encodeURIComponent(mood)}`;
            } catch(e) { alert("Sync Error!"); }
        }

        window.showAdGate = function() {
            const gate = document.getElementById('ad-gate');
            const btn = document.getElementById('claim-btn');
            const timer = document.getElementById('timer');
            gate.classList.remove('hidden');
            let time = 10;
            const clock = setInterval(async () => {
                time--;
                timer.innerText = time;
                if(time <= 0) {
                    clearInterval(clock);
                    btn.disabled = false;
                    btn.classList.replace('bg-white/10', 'btn-spotify');
                    btn.classList.remove('opacity-30');
                    btn.innerText = "CLAIM 10 COINS";
                    btn.onclick = async () => {
                        const userRef = doc(db, "users", userUID);
                        const userSnap = await getDoc(userRef);
                        await updateDoc(userRef, { coins: userSnap.data().coins + 10 });
                        document.getElementById('coin-count').innerText = userSnap.data().coins + 10;
                        gate.classList.add('hidden');
                    };
                }
            }, 1000);
        }

        window.toggleModal = (id) => document.getElementById(id).classList.toggle('hidden');
        document.getElementById('vibe-btn').onclick = processVibe;
        syncCoins();
    </script>
</body>
</html>
